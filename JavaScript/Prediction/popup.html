<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: #45a049;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        #status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            word-wrap: break-word;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
        }

        .info {
            background-color: #d1ecf1;
            color: #0c5460;
        }

        .progress-container {
            margin-top: 8px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: #4CAF50;
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
            text-align: center;
        }
    </style>
</head>

<body>
    <h2 id="title">预测市场数据抓取</h2>
    <button id="scrapeBtn">重新抓取</button>

    <!-- Kalshi 滚动配置 -->
    <div id="kalshiConfig"
        style="display:none; margin-top: 10px; padding: 10px; background: #f0f0f0; border-radius: 4px;">
        <label style="display: block; margin-bottom: 5px; font-size: 13px;">
            Kalshi 滚动次数:
            <input type="number" id="scrollCountInput" value="20" min="1" max="50"
                style="width: 60px; padding: 4px; margin-left: 5px; border: 1px solid #ccc; border-radius: 3px;">
        </label>
        <div style="font-size: 11px; color: #666; margin-top: 4px;">
            建议: 10-30次，每次约1.5秒
        </div>
    </div>

    <div id="status"></div>
    <div id="progressContainer" class="progress-container">
        <div class="progress-bar">
            <div id="progressBarFill" class="progress-bar-fill"></div>
        </div>
        <div id="progressText" class="progress-text"></div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
